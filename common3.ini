proxy-groups:
  - name: Proxies
    type: select
    proxies:
      - HK
      - SG
      - JP
      - US
      - Manual
  - name: Manual
    include-all: true
    type: select
  - name: GMedia
    type: select
    proxies:
      - Proxies
      - HK
      - JP
      - SG
  - name: Steam
    type: select
    include-all: true
    filter: 日用
    proxies:
      - Proxies
      - Manual
      - DIRECT
  - name: Scholar
    type: select
    include-all: true
    filter: 高级.*(03|04)
  - name: OpenAi
    type: select
    include-all: true
    filter: 高级.*(03|04)
  - name: Onedrive
    type: select
    include-all: true
    filter: 日用
    proxies:
      - Proxies
      - DIRECT
  - name: CN
    type: select
    proxies:
      - DIRECT
      - Proxies
  - name: AdBlock
    type: select
    proxies:
      - REJECT
      - DIRECT
      - Proxies
  - name: Final
    type: select
    proxies:
      - Proxies
      - DIRECT
  - name: HK
    include-all: true
    filter: 香港
    type: fallback
    interval: 600
    tolerance: 50
  - name: SG
    include-all: true
    filter: 新加坡|狮城
    type: fallback
    interval: 600
    tolerance: 50
  - name: JP
    include-all: true
    filter: 日本
    type: fallback
    interval: 600
    tolerance: 50
  - name: US
    include-all: true
    filter: 美国
    type: fallback
    interval: 600
    tolerance: 50

